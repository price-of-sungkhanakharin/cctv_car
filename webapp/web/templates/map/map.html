{% extends "base/base.html" %}

{% block head %}
<link rel="stylesheet" href="{{ 'css/parking-map.css' | static_url }}">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
{% endblock head %}

{% block body %}
<!-- Main Content -->
<div
  class="flex-1 w-full relative flex flex-col overflow-hidden bg-[#121214] rounded-xl border border-zinc-800/50 shadow-2xl">
  <!-- Search Box -->
  <div class="absolute top-6 left-6 z-20 w-full max-w-sm pointer-events-none">
    <div class="search-box rounded-xl shadow-lg pointer-events-auto p-2">
      <div class="flex items-center px-2">
        <span class="material-symbols-outlined text-slate-400">search</span>
        <input class="w-full bg-transparent border-none focus:ring-0 text-white placeholder-slate-500 h-10 text-sm"
          placeholder="Find parking lot..." type="text" id="searchInput" />
      </div>
    </div>
  </div>

  <!-- Map Container -->
  <div id="map" class="flex-1 w-full h-full relative rounded-lg"></div>

  <!-- Map Controls -->
  <div class="absolute bottom-8 right-8 z-20 flex flex-col gap-3 pointer-events-none">
    <div
      class="flex flex-col rounded-lg shadow-xl overflow-hidden border border-slate-200 dark:border-zinc-700 pointer-events-auto">
      <button class="size-10 flex items-center justify-center map-control-button border-b" onclick="map.zoomIn()">
        <span class="material-symbols-outlined">add</span>
      </button>
      <button class="size-10 flex items-center justify-center map-control-button" onclick="map.zoomOut()">
        <span class="material-symbols-outlined">remove</span>
      </button>
    </div>
    <button
      class="size-10 flex items-center justify-center rounded-lg shadow-xl bg-primary text-white pointer-events-auto hover:bg-blue-600 transition-colors border border-transparent"
      onclick="zoomToUniversity()">
      <span class="material-symbols-outlined">my_location</span>
    </button>
  </div>

  <!-- Map Legend -->
  <div class="absolute bottom-6 left-6 z-20 pointer-events-none">
    <div class="map-legend rounded-lg shadow-lg p-4 pointer-events-auto w-48">
      <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Map Legend</h4>
      <div class="flex flex-col gap-2">
        <div class="legend-item">
          <span class="legend-dot legend-dot-parking"></span>
          Parking Lot
        </div>
        <div class="legend-item">
          <span class="legend-dot legend-dot-building"></span>
          Campus Building
        </div>
        <div class="legend-item">
          <span class="legend-dot legend-dot-green"></span>
          Green Area
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Initialize Leaflet Map
  // Prince of Songkla University - Kho Hong Campus coordinates
  // Address: 15 Kanchanawanit Rd, Kho Hong, Hat Yai, Songkhla 90110
  const PSU_LAT = 7.010317;
  const PSU_LNG = 100.496555;

  let map = L.map('map').setView([PSU_LAT, PSU_LNG], 18);

  // Add OpenStreetMap tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 21,
    minZoom: 15
  }).addTo(map);

  // Custom parking marker icon
  const parkingIcon = L.divIcon({
    html: `<div class="parking-marker"><span class="material-symbols-outlined text-white text-2xl relative z-10">local_parking</span></div>`,
    iconSize: [56, 56],
    iconAnchor: [28, 28],
    popupAnchor: [0, -28]
  });

  const smallParkingIcon = L.divIcon({
    html: `<div class="parking-marker-small"></div>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12],
    popupAnchor: [0, -12]
  });

  // Real parking lots data from database
  const db_parking_lots = {{ parking_lots | tojson | safe }};

  // Process data to match the map's expected structure
  const parkingLots = db_parking_lots.map(lot => ({
    name: lot.name,
    location: lot.ip_address,
    lat: lot.lat,
    lng: lot.lng,
    capacity: lot.available_slots !== null ? lot.available_slots : 0,
    maxCapacity: lot.total_slots !== null ? lot.total_slots : 0,
    status: lot.status,
    status_label: lot.status.charAt(0).toUpperCase() + lot.status.slice(1),
    capacityPercent: lot.capacityPercent
  }));

  // Fallback if no real data exists (to keep the map from being empty during demo)
  if (parkingLots.length === 0) {
    parkingLots.push({
      name: 'No Camera Detected',
      location: 'Please add cameras with GPS in settings',
      lat: PSU_LAT,
      lng: PSU_LNG,
      capacity: 0,
      maxCapacity: 0,
      status: 'full',
      status_label: 'Offline',
      capacityPercent: 100
    });
  }

  // Create popup content
  function createPopupContent(lot) {
    const statusColors = {
      'open': '#22c55e',
      'filling': '#fb923c',
      'full': '#ef4444'
    };
    const statusBgColors = {
      'open': 'rgba(34, 197, 94, 0.1)',
      'filling': 'rgba(251, 146, 60, 0.1)',
      'full': 'rgba(239, 68, 68, 0.1)'
    };

    return `
      <div class="parking-popup-content" style="width: 280px;">
        <div style="background-color: #27272a; padding: 16px; border-bottom: 1px solid rgba(113, 113, 122, 0.3);">
          <div style="display: flex; justify-content: space-between; align-items: start;">
            <div>
              <h3 style="font-weight: bold; color: white; font-size: 16px; margin: 0;">${lot.name}</h3>
              <p style="font-size: 12px; color: #a1a1aa; margin: 4px 0 0 0;">${lot.location || ''}</p>
            </div>
            <span style="background-color: ${statusBgColors[lot.status]}; border: 1px solid ${statusColors[lot.status]}; color: ${statusColors[lot.status]}; padding: 4px 8px; border-radius: 2px; font-size: 10px; font-weight: bold; white-space: nowrap;">${lot.status_label}</span>
          </div>
        </div>
        <div style="padding: 16px;">
          <div style="display: flex; justify-content: space-between; align-items: center; font-size: 14px; margin-bottom: 12px;">
            <span style="color: #a1a1aa;">Capacity</span>
            <span style="color: white; font-family: monospace;">${lot.capacity}/${lot.maxCapacity}</span>
          </div>
          <div style="background-color: rgba(113, 113, 122, 0.3); border-radius: 9999px; overflow: hidden; height: 6px; margin-bottom: 16px;">
            <div style="height: 100%; width: ${lot.capacityPercent}%; background-color: ${lot.capacityPercent >= 85 ? '#ef4444' : lot.capacityPercent >= 50 ? '#fb923c' : '#22c55e'};"></div>
          </div>
          <button style="width: 100%; background-color: #3b82f6; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 8px;">
            <span class="material-symbols-outlined" style="font-size: 18px;">videocam</span>
            View Live Feed
          </button>
        </div>
      </div>
    `;
  }

  // Add parking lot markers
  parkingLots.forEach((lot, index) => {
    const icon = index === 0 ? parkingIcon : smallParkingIcon;
    const marker = L.marker([lot.lat, lot.lng], { icon: icon }).addTo(map);
    marker.bindPopup(createPopupContent(lot), { maxWidth: 300 });
  });

  // Zoom to university function
  function zoomToUniversity() {
    map.setView([PSU_LAT, PSU_LNG], 15);
  }

  // Search functionality (placeholder)
  document.getElementById('searchInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      const query = e.target.value.toLowerCase();
      const found = parkingLots.find(lot => lot.name.toLowerCase().includes(query));
      if (found) {
        map.setView([found.lat, found.lng], 19);
      }
    }
  });
</script>
{% endblock body %}
