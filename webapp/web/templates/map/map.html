{% extends "base/base.html" %}

{% block head %}
<link rel="stylesheet" href="{{ 'css/parking-map.css' | static_url }}">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  .parking-availability-label {
    background: #3b82f6;
    border: 2px solid #0f172a;
    border-radius: 999px;
    color: white;
    font-weight: 800;
    font-size: 11px;
    padding: 2px 6px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
    white-space: nowrap;
    pointer-events: none;
    text-align: center;
    min-width: 20px;
  }

  .leaflet-tooltip-top:before {
    border-top-color: #3b82f6;
  }
</style>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
{% endblock head %}

{% block body %}
<!-- Main Content -->
<div
  class="flex-1 w-full relative flex flex-col overflow-hidden bg-[#121214] rounded-xl border border-zinc-800/50 shadow-2xl">
  <!-- Search Box -->
  <div class="absolute top-6 left-16 z-[1000] w-full max-w-sm pointer-events-none">
    <div class="search-box rounded-xl shadow-lg pointer-events-auto p-2">
      <div class="flex items-center px-2">
        <span class="material-symbols-outlined text-slate-400">search</span>
        <input class="w-full bg-transparent border-none focus:ring-0 text-white placeholder-slate-500 h-10 text-sm"
          placeholder="Find parking lot..." type="text" id="searchInput" />
      </div>
    </div>
  </div>

  <!-- Top Right Info Legend -->
  <div class="absolute top-6 right-6 z-[1000] pointer-events-none">
    <div
      class="bg-[#171717] rounded-lg shadow-lg p-3 pointer-events-auto border border-white/10 flex flex-col gap-1 text-xs">
      <div class="font-bold text-slate-300 border-b border-white/10 pb-1 mb-1">Available Slots</div>
      <div class="flex items-center gap-2 text-slate-400">
        <span class="font-bold text-blue-400 w-4">C:</span> Car
      </div>
      <div class="flex items-center gap-2 text-slate-400">
        <span class="font-bold text-blue-400 w-4">M:</span> Motorcycle
      </div>
    </div>
  </div>

  <!-- Map Container -->
  <div id="map" class="flex-1 w-full h-full relative rounded-lg"></div>

  <!-- Map Controls -->
  <div class="absolute bottom-8 right-8 z-[1000] flex flex-col gap-3 pointer-events-none">
    <div
      class="flex flex-col rounded-lg shadow-xl overflow-hidden border border-slate-200 dark:border-zinc-700 pointer-events-auto">
      <button class="size-10 flex items-center justify-center map-control-button border-b" onclick="map.zoomIn()">
        <span class="material-symbols-outlined">add</span>
      </button>
      <button class="size-10 flex items-center justify-center map-control-button" onclick="map.zoomOut()">
        <span class="material-symbols-outlined">remove</span>
      </button>
    </div>
    <button
      class="size-10 flex items-center justify-center rounded-lg shadow-xl bg-primary text-white pointer-events-auto hover:bg-blue-600 transition-colors border border-transparent"
      onclick="zoomToUniversity()">
      <span class="material-symbols-outlined">my_location</span>
    </button>
  </div>
</div>

<script>
  const PSU_LAT = 7.010317;
  const PSU_LNG = 100.496555;

  const urlParams = new URLSearchParams(window.location.search);
  const startLat = urlParams.has('lat') ? parseFloat(urlParams.get('lat')) : PSU_LAT;
  const startLng = urlParams.has('lng') ? parseFloat(urlParams.get('lng')) : PSU_LNG;
  const startZoom = urlParams.has('lat') && urlParams.has('lng') ? 19 : 18;

  let map = L.map('map').setView([startLat, startLng], startZoom);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 21, minZoom: 15
  }).addTo(map);

  // ---- Icon definitions ----
  function makeIcon(color, large) {
    const size = large ? 56 : 44;
    const icons = {
      loading: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:#52525b;border:3px solid #71717a;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4);animation:pulse 1.5s infinite;">
                  <span class="material-symbols-outlined text-white" style="font-size:${large ? 24 : 18}px">sync</span></div>`,
      online: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:#1d4ed8;border:3px solid #3b82f6;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(59,130,246,.4);">
                  <span class="material-symbols-outlined text-white" style="font-size:${large ? 24 : 18}px">local_parking</span></div>`,
      offline: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:#7f1d1d;border:3px solid #ef4444;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(239,68,68,.4);">
                  <span class="material-symbols-outlined text-white" style="font-size:${large ? 24 : 18}px">wifi_off</span></div>`,
    };
    return (state) => L.divIcon({
      html: icons[state] || icons.offline,
      iconSize: [size, size], iconAnchor: [size / 2, size / 2], popupAnchor: [0, -(size / 2)]
    });
  }

  // ---- Database initial data ----
  const db_parking_lots = {{ parking_lots | tojson | safe }};

  // Map: camera_id → { marker, tooltip, lot }
  const markerMap = {};

  function capacityLabel(name, cars_avail, motos_avail) {
    if (cars_avail === null || cars_avail === undefined) return '?';
    return `<div style="text-align: center; font-weight: bold;">${name}</div>
            <div style="text-align: center;">C: ${cars_avail} | M: ${motos_avail}</div>`;
  }

  function createPopupContent(lot, isOnline, fresh) {
    // 🚗 Cars
    const carAvail = fresh?.available_car_slots ?? lot.available_car_slots ?? 0;
    const carTotal = fresh?.total_car_slots ?? lot.total_car_slots ?? 0;
    const carPct = carTotal > 0 ? Math.round(((carTotal - carAvail) / carTotal) * 100) : 0;

    // 🏍️ Motorcycles
    const motoAvail = fresh?.available_motorcycle_slots ?? lot.available_motorcycle_slots ?? 0;
    const motoTotal = fresh?.total_motorcycle_slots ?? lot.total_motorcycle_slots ?? 0;
    const motoPct = motoTotal > 0 ? Math.round(((motoTotal - motoAvail) / motoTotal) * 100) : 0;

    // 🚨 Violations
    const violations = fresh?.violation_slots ?? lot.violation_slots ?? 0;

    // Summary
    const pct = fresh?.capacityPercent ?? lot.capacityPercent ?? 0;
    const statusLabel = !isOnline ? 'Offline' : pct >= 85 ? 'Full' : pct >= 50 ? 'Filling' : 'Open';
    const statusColor = !isOnline ? '#ef4444' : pct >= 85 ? '#ef4444' : pct >= 50 ? '#fb923c' : '#22c55e';

    return `
      <div style="width:280px;">
        <div style="background:#27272a;padding:16px;border-bottom:1px solid rgba(113,113,122,.3);">
          <div style="display:flex;justify-content:space-between;align-items:start;">
            <div>
              <h3 style="font-weight:bold;color:white;font-size:16px;margin:0">${lot.name}</h3>
              <p style="font-size:12px;color:#a1a1aa;margin:4px 0 0">${lot.ip_address || ''}</p>
            </div>
            <span style="background:${statusColor}22;border:1px solid ${statusColor};color:${statusColor};padding:4px 8px;border-radius:4px;font-size:10px;font-weight:bold;white-space:nowrap">${statusLabel}</span>
          </div>
        </div>
        <div style="padding:16px;">
          ${isOnline ? `
          <!-- Car Stats -->
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;">
            <span style="color:#a1a1aa; display:flex; align-items:center; gap:4px;">
              <span class="material-symbols-outlined" style="font-size:14px; color:#3b82f6;">directions_car</span> Cars
            </span>
            <span style="color:white;font-family:monospace">${carAvail}/${carTotal}</span>
          </div>
          <div style="background:rgba(113,113,122,.3);border-radius:999px;overflow:hidden;height:4px;margin-bottom:12px;">
            <div style="height:100%;width:${carPct}%;background:#3b82f6;transition:width .5s"></div>
          </div>
          
          <!-- Motorcycle Stats -->
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;">
            <span style="color:#a1a1aa; display:flex; align-items:center; gap:4px;">
              <span class="material-symbols-outlined" style="font-size:14px; color:#10b981;">two_wheeler</span> Motorcycles
            </span>
            <span style="color:white;font-family:monospace">${motoAvail}/${motoTotal}</span>
          </div>
          <div style="background:rgba(113,113,122,.3);border-radius:999px;overflow:hidden;height:4px;margin-bottom:12px;">
            <div style="height:100%;width:${motoPct}%;background:#10b981;transition:width .5s"></div>
          </div>
          
          <!-- Violations -->
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:16px; padding-top:8px; border-top:1px dashed rgba(113,113,122,.3);">
            <span style="color:#ef4444; display:flex; align-items:center; gap:4px; font-weight:bold;">
              <span class="material-symbols-outlined" style="font-size:14px;">warning</span> Violations
            </span>
            <span style="color:#ef4444;font-family:monospace; font-weight:bold;">${violations}</span>
          </div>
          ` : `
          <p style="color:#ef4444;font-size:13px;margin-bottom:16px;text-align:center">⚠️ กล้องออฟไลน์หรือเชื่อมต่อไม่ได้</p>`}
          
          <a href="/camera/${lot.camera_id}" target="_blank"
            style="width:100%;background:#3b82f6;color:white;padding:12px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;font-size:12px;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;"
            onmouseover="this.style.background='#2563eb'" onmouseout="this.style.background='#3b82f6'">
            <span class="material-symbols-outlined" style="font-size:18px">videocam</span>
            View Live Feed
          </a>
        </div>
      </div>`;
  }

  // ---- Render initial markers (loading state) ----
  db_parking_lots.forEach((lot, idx) => {
    const isLarge = idx === 0;
    const iconFactory = makeIcon('', isLarge);

    const marker = L.marker([lot.lat, lot.lng], { icon: iconFactory('loading') }).addTo(map);
    marker.bindPopup(createPopupContent(lot, true, null), { maxWidth: 300 });

    const tooltip_cars = lot.available_car_slots || 0;
    const tooltip_motos = lot.available_motorcycle_slots || 0;
    const tooltip = marker.bindTooltip(capacityLabel(lot.name, tooltip_cars, tooltip_motos), {
      permanent: true, direction: 'top',
      className: 'parking-availability-label',
      offset: isLarge ? [0, -32] : [0, -22]
    });
    tooltip.openTooltip();

    markerMap[lot.camera_id] = { marker, iconFactory, lot, isLarge };
  });

  // ---- Progressive async sync per camera (max 5s) ----
  async function syncCamera(camera_id) {
    const entry = markerMap[camera_id];
    if (!entry) return;
    const { marker, iconFactory, lot, isLarge } = entry;

    let retryInterval = null;

    const performSync = async () => {
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 5000); // 5s timeout per request
        const res = await fetch(`/api/map/sync_camera/${camera_id}`, { signal: controller.signal });
        clearTimeout(timeout);

        if (res.ok) {
          const data = await res.json();

          if (data.online) {
            // หยุดวงจร retry ชั่วคราวเพราะต่อติดแล้ว
            if (retryInterval) {
              clearInterval(retryInterval);
              retryInterval = null;
            }

            marker.setIcon(iconFactory('online'));
            marker.setPopupContent(createPopupContent(lot, true, data));
            const avail_cars = data.available_car_slots || 0;
            const avail_motos = data.available_motorcycle_slots || 0;
            marker.setTooltipContent(capacityLabel(lot.name, avail_cars, avail_motos));

            // ดักเช็คสถานะครั้งต่อไปใน 5 วิ (อัปเดตข้อมูลต่อเนื่องโดยไม่ต้องโหลดหน้าใหม่)
            setTimeout(performSync, 5000);
            return; // Exit early since we succeeded
          } else {
            // backend says it's off (data sync failed AND stream ping failed)
            marker.setIcon(iconFactory('offline'));
            marker.setPopupContent(createPopupContent(lot, false, data)); // uses newest DB data
            marker.setTooltipContent('✕');
          }
        }
      } catch (e) {
        // Hard fail (our own backend timeout or crash)
        marker.setIcon(iconFactory('offline'));
        marker.setPopupContent(createPopupContent(lot, false, lot)); // uses initial lot data mapped
        marker.setTooltipContent('✕');
      }

      // เริ่มวงจร Auto-Reconnect โหลดใหม่ทุก 5 วิ (ถ้ามัน Offline หรือ Error)
      if (!retryInterval) {
        retryInterval = setInterval(performSync, 5000);
      }
    };

    // เริ่มทำงานครั้งแรก
    performSync();
  }

  // ยิง sync ทุกกล้องพร้อมกัน (parallel)
  db_parking_lots.forEach(lot => syncCamera(lot.camera_id));

  // ---- Zoom & Search ----
  function zoomToUniversity() { map.setView([PSU_LAT, PSU_LNG], 15); }

  document.getElementById('searchInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      const q = e.target.value.toLowerCase();
      const found = db_parking_lots.find(l => l.name.toLowerCase().includes(q));
      if (found) map.setView([found.lat, found.lng], 19);
    }
  });

  // Pulse animation for loading state
  const style = document.createElement('style');
  style.textContent = `@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }`;
  document.head.appendChild(style);
</script>
{% endblock body %}
