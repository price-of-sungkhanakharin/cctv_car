{% extends "base/base.html" %}

{% block title %}Settings: {{ camera.name }} - {{ config.APP_TITLE }}{% endblock %}

{% block head %}
<style>
    .iframe-container {
        flex: 1;
        width: 100%;
        min-height: 0;
        background-color: white;
        border-radius: 0.5rem;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
{% endblock %}

{% block body %}
<div class="flex flex-col h-full w-full bg-[#0b1116] overflow-hidden">
    <!-- Header -->
    <header class="flex items-center justify-between px-6 py-4 border-b border-white/10 bg-[#0b1116] shrink-0">
        <div class="flex items-center gap-4">
            <button onclick="window.close()"
                class="size-10 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center text-slate-300 transition-colors border border-white/5">
                <span class="material-symbols-outlined text-xl">arrow_back</span>
            </button>
            <div>
                <div class="flex items-center gap-3 mb-1">
                    <h1 class="text-xl font-bold text-white tracking-tight">Camera Settings</h1>
                    <div
                        class="flex items-center gap-1.5 px-2.5 py-1 rounded bg-black/40 border border-white/5 backdrop-blur-sm">
                        <span class="text-[10px] font-mono text-slate-400">ID:</span>
                        <span class="text-xs font-mono font-medium text-blue-400">{{ camera.camera_id }}</span>
                    </div>
                </div>

                <div class="flex items-center gap-4 text-xs font-medium text-slate-400">
                    <span class="text-slate-300">{{ camera.name }}</span>
                    <div class="w-1 h-1 rounded-full bg-white/20"></div>
                    <div class="flex items-center gap-1.5">
                        <span class="material-symbols-outlined text-[14px] text-slate-500">public</span>
                        Source: <a href="{{ target_url }}" target="_blank"
                            class="font-mono text-blue-300 hover:underline">{{ target_url }}</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <a href="{{ target_url }}" target="_blank"
                class="flex items-center gap-2 px-4 py-2 bg-[#1c222b] hover:bg-slate-700 border border-white/10 text-white rounded-lg text-sm font-medium transition-all">
                <span class="material-symbols-outlined text-[18px]">open_in_new</span>
                Open External
            </a>
        </div>
    </header>

    <!-- Main Content Area with Iframe -->
    <main class="flex-1 flex p-6 min-h-0">
        <div class="iframe-container shadow-2xl">
            <!-- Embedding the mock website -->
            <iframe src="{{ target_url }}" title="Camera Settings"></iframe>
        </div>
    </main>
</div>
{% endblock %}
